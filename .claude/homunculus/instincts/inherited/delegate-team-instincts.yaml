# Run repository-defined validation

## Action
Use `npm ci`, `npm run typecheck`, `npm run build`, `npm test`, and `npm run version:check` as applicable. For package changes, also run `npm pack --dry-run`.

## Evidence
- `package.json` defines these canonical scripts.
- `.github/workflows/ci.yml` executes them across the supported Node matrix.
- `npm test` includes both Vitest and `tests/test-v2.7.0.sh`.
