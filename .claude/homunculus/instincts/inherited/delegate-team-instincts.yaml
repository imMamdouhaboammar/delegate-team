# Follow repository naming rules

## Action
Use lowercase kebab-case for components and scripts, keep `SKILL.md` uppercase, align skill directories with their frontmatter name, and name MMAS agents as `mmas/agents/<role>.yaml`.

## Evidence
- `AGENTS.md` documents the exact naming conventions for these surfaces.
