# Create focused reviewed commits

## Action
Stage only intended paths, inspect the staged diff, use a Conventional Commit message, and do not push automatically.

## Evidence
- `AGENTS.md` defines repository conventions and versioning boundaries.
- Recent repository history uses focused Conventional Commit messages.
- Review authority and remote updates must remain explicit.
