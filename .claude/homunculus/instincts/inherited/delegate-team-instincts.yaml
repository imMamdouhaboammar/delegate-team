# Keep secret findings contained

## Action
Use redaction, avoid broad allowlists, prevent credential persistence, do not upload findings as artifacts, and rotate a potentially exposed credential before repository cleanup.

## Evidence
- `.github/workflows/secret-scan.yml` defines the repository gate.
- `.gitleaks.toml` keeps suppressions narrow.
- `docs/SECRET-SCANNING.md` documents incident handling and local reproduction.
