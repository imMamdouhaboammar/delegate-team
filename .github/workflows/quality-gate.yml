name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check types
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Run Vitest suite
        run: npx vitest run

      - name: Run shell integration suite
        run: bash tests/test-v2.7.0.sh

      - name: Verify version synchronization
        run: npm run version:check

      - name: Inspect publish payload
        run: npm pack --dry-run

  python-syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python sources
        shell: bash
        run: |
          find . -type f -name '*.py' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 | xargs -0 --no-run-if-empty python -m py_compile
