name: release

# Auto-create a GitHub Release on every `vX.Y.Z` tag push.
#
# Composes with `.github/release.yml` which provides the PR-label-based
# category mapping used by `generate_release_notes`.
#
# Required permissions:
#   - contents: write   — to create the release
#   - id-token: write   — for npm provenance (when this workflow chains
#                         npm-publish.yml via needs:, the npm publish
#                         action uses the OIDC token)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.3.0)'
        required: true
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  # Available to all jobs below (replaces the broken ${{ needs.create-release.outputs.tag }})
  TARGET_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  create-release:
    name: Auto-create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      body: ${{ steps.create_release.outputs.body }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Expose tag for downstream jobs
        id: tag-meta
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tar_path=/tmp/delegate-team-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch previous tag (for changelog baseline)
        id: baseline
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PREV=$(git tag --sort=-version:refname \
              2>/dev/null | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | awk -v t="$TAG" '$0 < t' \
              | head -1)
          echo "name=${PREV}" >> "$GITHUB_OUTPUT"
          echo "previous tag: ${PREV:-<none — full repo history>}"

      - name: Generate release notes (PR-based auto-categorization)
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.tag.outputs.name }}',
              target_commitish: 'master',
              previous_tag_name: '${{ steps.baseline.outputs.name }}',
            });
            core.info(`Auto-generated notes length: ${release.body.length}`);
            core.setOutput('notes', release.body);
            core.setOutput('name', release.name);

      - name: Read release template (.github/RELEASE_TEMPLATE.md)
        id: template
        shell: bash
        run: |
          if [ -f .github/RELEASE_TEMPLATE.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Template will be prepended in body step."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose release body
        id: body
        shell: bash
        run: |
          {
            echo "## 🛠️ delegate-team ${{ steps.tag.outputs.name }}"
            echo ""
            echo "Auto-generated from commits + PR labels between \`${{ steps.baseline.outputs.name }}\` and \`${{ steps.tag.outputs.name }}\`."
            echo ""
            echo "---"
            echo ""
            echo "${{ steps.notes.outputs.notes }}"
            echo ""
            echo "---"
            echo ""
            echo "### 📥 Install / upgrade"
            echo ""
            echo '```bash'
            echo "npm install -g delegate-team@latest"
            echo "dt --version   # confirms upgrade"
            echo '```'
            echo ""
            echo "### 🔗 See also"
            echo ""
            echo "- [Full CHANGELOG](https://github.com/imMamdouhaboammar/delegate-team/blob/master/CHANGELOG.md)"
            echo "- [npm registry](https://www.npmjs.com/package/delegate-team)"
          } > /tmp/release-body.md
          echo "body written ($(wc -c < /tmp/release-body.md) bytes)"

      - name: Create release (idempotent — skip if already exists)
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const TAG = '${{ steps.tag.outputs.name }}';
            // Check if release already exists
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: TAG,
              });
              core.info(`Release for ${TAG} already exists at ${existing.html_url}`);
              core.setOutput('upload_url', existing.upload_url);
              core.setOutput('body', existing.body);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const fs = require('fs');
            const body = fs.readFileSync('/tmp/release-body.md', 'utf8');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: TAG,
              name: `🛠️ ${TAG} — auto release`,
              body: body,
              draft: false,
              prerelease: false,
              generate_release_notes: false,  // we already wrote them
            });

            core.setOutput('upload_url', data.upload_url);
            core.setOutput('body', data.body);
            core.info(`Created release: ${data.html_url}`);

  attach-assets:
    name: Attach source tarball
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate source tarball
        id: tarball
        shell: bash
        run: |
          TAG="${TARGET_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::TARGET_TAG env var is empty"; exit 1
          fi
          git archive --prefix="delegate-team-${TAG}/" \
              --format=tar.gz \
              -o "/tmp/delegate-team-${TAG}.tar.gz" \
              "${TAG}"
          echo "path=/tmp/delegate-team-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "size: $(stat -c %s /tmp/delegate-team-${TAG}.tar.gz) bytes"

      - name: Upload tarball to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.tarball.outputs.path }}
          asset_name: delegate-team-${TARGET_TAG}.tar.gz
          asset_content_type: application/gzip

  update-latest:
    name: Mark as Latest release
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Re-mark as Latest (if multiple releases exist)
        uses: actions/github-script@v7
        env:
          TAG: ${{ env.TARGET_TAG }}
        with:
          script: |
            const TAG = process.env.TAG;
            try {
              const { data: latest } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const ourTag = TAG.replace(/^v/, '');
              const theirTag = latest.tag_name.replace(/^v/, '');
              const [aMaj, aMin, aPat] = ourTag.split('.').map(Number);
              const [bMaj, bMin, bPat] = theirTag.split('.').map(Number);
              const oursNewer = (aMaj > bMaj) ||
                                (aMaj === bMaj && aMin > bMin) ||
                                (aMaj === bMaj && aMin === bMin && aPat > bPat);
              if (!oursNewer) {
                core.info(`Not marking as latest — newer release ${latest.tag_name} exists`);
                return;
              }
            } catch (e) {
              // No prior release exists → we're the latest by default
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: await (async () => {
                const { data } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner, repo: context.repo.repo, tag: TAG,
                });
                return data.id;
              })(),
              make_latest: 'true',
            });
            core.info(`Marked ${TAG} as the latest release.`);
