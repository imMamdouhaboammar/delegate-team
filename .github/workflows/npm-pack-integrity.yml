name: npm Pack Integrity

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-pack-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-files:
    name: Runtime file integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use supported Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify packed artifact
        run: npm run pack:verify
