name: Test Diagnostics

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Unit ${{ matrix.test-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-name: cleanup
            test-file: tests/cleanup.test.ts
          - test-name: fallback
            test-file: tests/fallback.test.ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - name: Run isolated test
        id: isolated-test
        continue-on-error: true
        run: npx vitest run "${{ matrix.test-file }}" --reporter=verbose > test-output.log 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.test-name }}
          path: test-output.log
          if-no-files-found: error
      - name: Preserve failing status
        if: steps.isolated-test.outcome == 'failure'
        run: exit 1
