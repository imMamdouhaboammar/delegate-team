name: Test Diagnostics

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Unit ${{ matrix.test-file }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - tests/cleanup.test.ts
          - tests/cli.test.ts
          - tests/dispatch-dry-run.test.ts
          - tests/doctor-json.test.ts
          - tests/fallback.test.ts
          - tests/manifest-version.test.ts
          - tests/mmas-process-groups.test.ts
          - tests/package-files.test.ts
          - tests/port.test.ts
          - tests/router.test.ts
          - tests/runtime-paths.test.ts
          - tests/security.test.ts
          - tests/test_metagpt_adapter.test.ts
          - tests/v26-smoke.test.ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npx vitest run "${{ matrix.test-file }}" --reporter=dot --silent
